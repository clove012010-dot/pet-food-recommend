<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宠物粮智能推荐 v2</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #fdf6f0 0%, #f0e6d8 100%); min-height: 100vh; color: #3e2e23; }
.container { max-width: 860px; margin: 0 auto; padding: 24px 20px; }
header { text-align: center; margin-bottom: 28px; }
header h1 { font-size: 28px; color: #8B5E3C; margin-bottom: 6px; }
header p { color: #a08060; font-size: 14px; }
.card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(139,94,60,0.1); padding: 28px; margin-bottom: 20px; }
.card h2 { font-size: 18px; color: #8B5E3C; margin-bottom: 18px; padding-bottom: 10px; border-bottom: 2px solid #f0e6d8; }
.card h3 { font-size: 15px; color: #8B5E3C; margin: 16px 0 10px; }
.form-row { display: flex; gap: 14px; margin-bottom: 14px; flex-wrap: wrap; }
.form-group { flex: 1; min-width: 160px; }
.form-group label { display: block; font-size: 13px; color: #8B5E3C; margin-bottom: 5px; font-weight: 600; }
.form-group select, .form-group input { width: 100%; padding: 9px 12px; border: 2px solid #e8d5c4; border-radius: 10px; font-size: 14px; color: #3e2e23; background: #fdfaf7; transition: border-color 0.2s; }
.form-group select:focus, .form-group input:focus { outline: none; border-color: #c49a6c; }
.checkbox-group { display: flex; flex-wrap: wrap; gap: 8px; }
.checkbox-item { display: flex; align-items: center; gap: 5px; background: #fdf6f0; padding: 7px 12px; border-radius: 20px; border: 2px solid #e8d5c4; cursor: pointer; font-size: 13px; transition: all 0.2s; user-select: none; }
.checkbox-item:hover { border-color: #c49a6c; }
.checkbox-item.selected { background: #8B5E3C; color: #fff; border-color: #8B5E3C; }
.checkbox-item input { display: none; }
.btn { display: block; width: 100%; padding: 14px; background: #8B5E3C; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 8px; }
.btn:hover { background: #a0724d; }
.btn:disabled { background: #ccc; cursor: not-allowed; }
.sort-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.sort-btn { padding: 6px 14px; border: 2px solid #e8d5c4; border-radius: 20px; background: #fff; color: #8B5E3C; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.sort-btn:hover { border-color: #c49a6c; }
.sort-btn.active { background: #8B5E3C; color: #fff; border-color: #8B5E3C; }
#results { display: none; }
.result-header { text-align: center; margin-bottom: 18px; }
.result-header .energy { font-size: 13px; color: #a08060; margin-top: 4px; }
.insight-box { background: #e8f4fd; border-left: 4px solid #5b9bd5; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; color: #3e2e23; line-height: 1.8; }
.disease-info { background: #fff8f0; border-left: 4px solid #e8a838; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; color: #8B5E3C; line-height: 1.8; }
.food-card { background: #fdfaf7; border: 2px solid #f0e6d8; border-radius: 12px; padding: 18px; margin-bottom: 14px; transition: border-color 0.2s; }
.food-card:hover { border-color: #c49a6c; }
.food-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 10px; }
.food-title h3 { margin: 0 0 4px; font-size: 16px; color: #3e2e23; }
.food-title .desc { font-size: 13px; color: #6b5b4f; line-height: 1.6; }
.total-score { font-size: 28px; font-weight: 700; color: #8B5E3C; white-space: nowrap; text-align: center; }
.total-score small { display: block; font-size: 11px; color: #a08060; font-weight: 400; }
.score-bars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px 14px; margin: 10px 0; }
.score-bar-item { font-size: 11px; }
.score-bar-item .label { color: #8B5E3C; margin-bottom: 2px; display: flex; justify-content: space-between; }
.score-bar-item .bar { height: 6px; background: #f0e6d8; border-radius: 3px; overflow: hidden; }
.score-bar-item .fill { height: 100%; background: #8B5E3C; border-radius: 3px; }
.food-tags { display: flex; flex-wrap: wrap; gap: 5px; margin: 8px 0; }
.tag { font-size: 11px; padding: 3px 9px; border-radius: 12px; background: #f0e6d8; color: #8B5E3C; }
.tag.prescription { background: #e8a838; color: #fff; }
.tag.warning { background: #fde8e8; color: #c44; }
.tag.good { background: #e0ede0; color: #4a8; }
.match-reasons { font-size: 12px; margin: 8px 0; }
.match-reasons .reason { display: inline-block; background: #e0ede0; color: #4a8; padding: 2px 8px; border-radius: 10px; margin: 2px 4px 2px 0; }
.match-reasons .caution { display: inline-block; background: #fef3cd; color: #856404; padding: 2px 8px; border-radius: 10px; margin: 2px 4px 2px 0; }
.nutrition-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; font-size: 12px; margin-top: 10px; }
.nutrition-item { text-align: center; padding: 8px; background: #fff; border-radius: 8px; }
.nutrition-item .value { font-size: 15px; font-weight: 700; color: #8B5E3C; }
.nutrition-item .label { font-size: 11px; color: #a08060; }
.feeding-box { background: #f0f7f0; border-radius: 8px; padding: 10px 14px; margin-top: 10px; font-size: 13px; color: #3e2e23; }
.feeding-box strong { color: #4a8; }
.warning-list { font-size: 12px; color: #c44; margin-top: 6px; }
.goodpoint-list { font-size: 12px; color: #4a8; margin-top: 4px; }
.disclaimer { text-align: center; padding: 14px; font-size: 11px; color: #c49a6c; background: #fff8f0; border-radius: 10px; margin-top: 16px; line-height: 1.6; }
/* Profile bar */
.profile-bar { display: flex; align-items: center; gap: 12px; padding: 14px 18px !important; }
.profile-current { flex: 1; display: flex; align-items: center; gap: 8px; }
.profile-current span { white-space: nowrap; }
.profile-actions { display: flex; align-items: center; gap: 6px; }
.profile-btn { padding: 5px 10px; border: 2px solid #e8d5c4; border-radius: 8px; background: #fff; color: #8B5E3C; font-size: 13px; cursor: pointer; transition: all 0.2s; }
.profile-btn:hover { border-color: #c49a6c; }
.profile-btn.primary { background: #8B5E3C; color: #fff; border-color: #8B5E3C; }
.profile-btn.primary:hover { background: #a0724d; }
.profile-btn.danger:hover { background: #fde8e8; border-color: #c44; color: #c44; }
.profile-count { background: #fdf6f0; color: #a08060; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
.profile-empty { border: 2px dashed #e8d5c4 !important; background: #fffdf8 !important; }
#profileNameInput:focus { outline: none; border-bottom: 2px solid #c49a6c; }
#profileSelect { padding: 4px 8px; font-size: 13px; }
@media (max-width: 600px) {
  .profile-bar { flex-direction: column; align-items: stretch; }
  .profile-actions { justify-content: center; flex-wrap: wrap; }
}
/* Tab navigation */
.tab-bar { display: flex; gap: 0; margin: 0 0 12px; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(139,94,60,0.08); }
.tab-btn { flex: 1; padding: 12px 8px; border: none; background: #fdfaf7; color: #a08060; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; border-bottom: 3px solid transparent; }
.tab-btn:hover { background: #fdf6f0; }
.tab-btn.active { background: #fff; color: #8B5E3C; border-bottom-color: #8B5E3C; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
@media (max-width: 600px) {
  .tab-bar { overflow-x: auto; }
}
.loading { text-align: center; padding: 40px; color: #a08060; }
footer { text-align: center; padding: 20px; font-size: 12px; color: #c49a6c; }
.toggle-section { cursor: pointer; user-select: none; color: #8B5E3C; font-size: 14px; font-weight: 600; padding: 8px 0; }
.toggle-section:hover { color: #c49a6c; }
.toggle-content { display: none; }
.toggle-content.open { display: block; }
@media (max-width: 600px) {
  .form-row { flex-direction: column; }
  .food-header { flex-direction: column; }
  .nutrition-grid { grid-template-columns: repeat(2, 1fr); }
  .score-bars { grid-template-columns: repeat(1, 1fr); }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🐾 宠物粮智能推荐 v2</h1>
    <p>多维度分析，为你的毛孩子找到最适合的粮</p>
  </header>

  <!-- 多宠物档案栏（无 JS，由 #19 接入） -->
  <div id="profileEmpty" style="display:none" class="profile-empty card">
    <div style="text-align:center;padding:20px;color:#a08060">
      <div style="font-size:32px;margin-bottom:8px">🐾</div>
      <p style="margin-bottom:12px">还没有宠物档案</p>
      <button class="profile-btn primary" style="font-size:14px;padding:8px 20px">🐾 创建第一个档案</button>
    </div>
  </div>

  <div id="profileBar" style="display:none" class="profile-bar card">
    <div class="profile-current">
      <span style="font-size:12px;color:#a08060">当前档案</span>
      <input id="profileNameInput" style="border:none;background:transparent;font-size:16px;font-weight:600;color:#3e2e23;width:auto;min-width:80px;padding:2px 4px" value="未命名" readonly>
      <span class="profile-count">1/1</span>
    </div>
    <div class="profile-actions">
      <select id="profileSelect" class="profile-btn" style="min-width:80px"><option>未命名</option></select>
      <button class="profile-btn" title="新建">➕</button>
      <button class="profile-btn" title="复制">📋</button>
      <button class="profile-btn" title="保存">💾</button>
      <button class="profile-btn danger" title="删除">🗑</button>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="recommend">📋 推荐</button>
    <button class="tab-btn" data-tab="feeding">🍽 喂食</button>
    <button class="tab-btn" data-tab="vaccination">💉 疫苗</button>
  </div>

  <div class="tab-panel active" data-panel="recommend">
  <form id="petForm" class="card">
    <h2>📋 基本信息</h2>
    <div class="form-row">
      <div class="form-group">
        <label>宠物种类</label>
        <select name="species" required><option value="">请选择</option><option value="dog">🐶 狗</option><option value="cat">🐱 猫</option></select>
      </div>
      <div class="form-group">
        <label>品种</label>
        <select name="breedId" id="breedSelect" required><option value="">加载中…</option></select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>年龄（月）</label>
        <input type="number" name="ageMonths" min="1" max="300" placeholder="12 = 1岁" required>
      </div>
      <div class="form-group">
        <label>体重（kg）</label>
        <input type="number" name="weightKg" min="0.5" max="100" step="0.1" placeholder="如：5.0" required>
      </div>
      <div class="form-group">
        <label>性别</label>
        <select name="sex"><option value="unknown">未知</option><option value="male">公</option><option value="female">母</option></select>
      </div>
      <div class="form-group">
        <label>绝育</label>
        <select name="neutered"><option value="unknown">未知</option><option value="true">已绝育</option><option value="false">未绝育</option></select>
      </div>
    </div>

    <h3>🎯 体型与活动</h3>
    <div class="form-row">
      <div class="form-group">
        <label>体态评分 (1-9)</label>
        <select name="bodyConditionScore"><option value="5">5 - 标准</option><option value="1">1 - 极瘦</option><option value="2">2 - 偏瘦</option><option value="3">3 - 略瘦</option><option value="4">4 - 稍瘦</option><option value="6">6 - 略胖</option><option value="7">7 - 偏胖</option><option value="8">8 - 胖</option><option value="9">9 - 极胖</option></select>
      </div>
      <div class="form-group">
        <label>活动量</label>
        <select name="activityLevel"><option value="normal">正常</option><option value="low">较少</option><option value="high">较多</option></select>
      </div>
      <div class="form-group">
        <label>目标体重（kg）</label>
        <input type="number" name="targetWeightKg" min="0.5" max="100" step="0.1" placeholder="留空则不设目标">
      </div>
    </div>

    <h3>🥫 粮食品类筛选</h3>
    <div class="checkbox-group" id="foodTypeGroup">
      <label class="checkbox-item selected" id="foodType_dry"><input type="checkbox" name="foodType" value="dry" checked>干粮</label>
      <label class="checkbox-item" id="foodType_freeze_dried"><input type="checkbox" name="foodType" value="freeze_dried">含冻干</label>
      <label class="checkbox-item" id="foodType_grain_free"><input type="checkbox" name="foodType" value="grain_free">无谷配方</label>
    </div>

    <h3>💰 偏好设置</h3>
    <div class="form-row">
      <div class="form-group">
        <label>预算</label>
        <select name="budgetLevel"><option value="any">不限</option><option value="low">实惠</option><option value="medium">中等</option><option value="high">高端</option></select>
      </div>
      <div class="form-group">
        <label>护理目标</label>
        <select name="preferredGoal"><option value="">无特定目标</option><option value="减重">减重</option><option value="美毛">美毛护肤</option><option value="肠胃">肠胃调理</option><option value="低敏">低敏配方</option><option value="关节">关节保护</option><option value="泌尿">泌尿道健康</option><option value="性价比">高性价比</option></select>
      </div>
    </div>

    <h3>⚠ 过敏与规避</h3>
    <div class="checkbox-group" id="allergyGroup">
      <label class="checkbox-item"><input type="checkbox" name="allergies" value="鸡肉">鸡肉过敏</label>
      <label class="checkbox-item"><input type="checkbox" name="allergies" value="牛肉">牛肉过敏</label>
      <label class="checkbox-item"><input type="checkbox" name="allergies" value="鱼">鱼过敏</label>
      <label class="checkbox-item"><input type="checkbox" name="allergies" value="谷物">谷物过敏</label>
      <label class="checkbox-item"><input type="checkbox" name="allergies" value="乳制品">乳制品过敏</label>
      <label class="checkbox-item"><input type="checkbox" name="allergies" value="鸡蛋">鸡蛋过敏</label>
    </div>

    <h3>🏥 健康情况（可多选）</h3>
    <div class="checkbox-group" id="diseaseGroup">
      <label class="checkbox-item"><input type="checkbox" name="diseases" value="kidney">肾病/肾功能不全</label>
      <label class="checkbox-item"><input type="checkbox" name="diseases" value="pancreatitis">胰腺炎</label>
      <label class="checkbox-item"><input type="checkbox" name="diseases" value="allergy">食物过敏</label>
      <label class="checkbox-item"><input type="checkbox" name="diseases" value="obesity">肥胖/超重</label>
      <label class="checkbox-item"><input type="checkbox" name="diseases" value="diabetes">糖尿病</label>
      <label class="checkbox-item"><input type="checkbox" name="diseases" value="digestive">肠胃敏感</label>
      <label class="checkbox-item"><input type="checkbox" name="diseases" value="urinary">泌尿系统疾病</label>
      <label class="checkbox-item"><input type="checkbox" name="diseases" value="heart">心脏病</label>
    </div>

    <button type="submit" class="btn">🔍 为我推荐宠粮</button>
  </form>

  <div id="results"></div>
  </div>

  <div class="tab-panel" data-panel="feeding"></div>
  <div class="tab-panel" data-panel="vaccination"></div>

  <footer>
    <p>由 OpenCode 搭建 | 数据仅供参考，请遵医嘱</p>
  </footer>
</div>

<script src="pet-profile.js"></script>
<script>
let allBreeds = { cat: [], dog: [] };
let currentSort = 'health';
let currentRecommendations = [];

async function loadBreeds() {
  const select = document.getElementById('breedSelect');
  select.disabled = true;
  select.innerHTML = '<option value="">加载中…</option>';
  try { const res = await fetch('/api/breeds'); allBreeds = await res.json(); updateBreedOptions(); }
  catch (e) { select.innerHTML = '<option value="">加载失败，刷新试试</option>'; }
  finally { select.disabled = false; initProfileBar(); }
}
function updateBreedOptions() {
  const species = document.querySelector('[name="species"]').value;
  if (!species) return;
  const select = document.getElementById('breedSelect');
  const prevVal = select.value;
  select.innerHTML = '<option value="">请选择品种</option>';
  (allBreeds[species] || []).forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id;
    opt.textContent = b.fullName + '（' + b.typicalWeightKg + 'kg）';
    if (b.growthNeeds.proneToObesity) opt.textContent += ' ⚠易胖';
    select.appendChild(opt);
  });
  if (prevVal && (allBreeds[species] || []).some(b => b.id === prevVal)) select.value = prevVal;
}
document.getElementById('breedSelect').addEventListener('change', function () {
  const species = document.querySelector('[name="species"]').value;
  const breed = (allBreeds[species] || []).find(b => b.id === this.value);
  if (breed) document.querySelector('[name="weightKg"]').value = breed.typicalWeightKg;
});
document.querySelector('[name="species"]').addEventListener('change', updateBreedOptions);
loadBreeds();

/* ===== Tab 切换 ===== */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tab-btn.active').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel.active').forEach(p => p.classList.remove('active'));
    this.classList.add('active');
    const panel = document.querySelector(`.tab-panel[data-panel="${this.dataset.tab}"]`);
    if (panel) panel.classList.add('active');
  });
});

/* ===== 多宠物档案交互 ===== */
const profileStore = new PetProfile.ProfileStore(window.localStorage);

function getBreedName(species, breedId) {
  if (!breedId) return '(未选品种)';
  const list = allBreeds[species];
  if (!list) return breedId;
  const b = list.find(b => b.id === breedId);
  return b ? b.fullName : breedId;
}

function getFormValues() {
  const fd = new FormData(document.getElementById('petForm'));
  return PetProfile.ProfileStore.profileFromFormData(fd);
}

function setCheckboxes(name, values) {
  const arr = Array.isArray(values) ? values : [];
  document.querySelectorAll(`input[name="${name}"]`).forEach(cb => {
    cb.checked = arr.includes(cb.value);
    cb.parentElement.classList.toggle('selected', cb.checked);
  });
}

function setFormValues(p) {
  const pf = PetProfile.normalizeProfile(p);
  document.querySelector('[name="species"]').value = pf.species || '';
  updateBreedOptions();
  setTimeout(() => {
    document.getElementById('breedSelect').value = pf.breedId || '';
    document.querySelector('[name="ageMonths"]').value = pf.ageMonths;
    document.querySelector('[name="weightKg"]').value = pf.weightKg;
    document.querySelector('[name="sex"]').value = pf.sex;
    const neuteredVal = pf.neutered === 'true' ? 'true' : (pf.neutered === 'false' ? 'false' : 'unknown');
    document.querySelector('[name="neutered"]').value = neuteredVal;
    document.querySelector('[name="bodyConditionScore"]').value = pf.bodyConditionScore || 5;
    document.querySelector('[name="activityLevel"]').value = pf.activityLevel || 'normal';
    document.querySelector('[name="targetWeightKg"]').value = pf.targetWeightKg || '';
    document.querySelector('[name="budgetLevel"]').value = pf.budgetLevel || 'any';
    document.querySelector('[name="preferredGoal"]').value = pf.preferredGoal || '';
    setCheckboxes('foodType', pf.foodType);
    setCheckboxes('allergies', pf.allergies);
    setCheckboxes('diseases', pf.diseases);
    document.getElementById('profileNameInput').value = pf.name || '未命名';
  }, 100);
}

function renderProfileBar() {
  const all = profileStore.loadAll();
  const active = profileStore.getActive();
  const emptyEl = document.getElementById('profileEmpty');
  const barEl = document.getElementById('profileBar');

  if (all.length === 0) {
    emptyEl.style.display = 'block';
    barEl.style.display = 'none';
    return;
  }
  emptyEl.style.display = 'none';
  barEl.style.display = 'flex';

  document.getElementById('profileNameInput').value = active ? active.name : '未命名';
  const countEl = document.querySelector('.profile-count');
  if (countEl) countEl.textContent = (active ? (all.findIndex(p => p.id === active.id) + 1) : 0) + '/' + all.length;

  const sel = document.getElementById('profileSelect');
  sel.innerHTML = '';
  all.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.id;
    opt.textContent = p.name + ' (' + getBreedName(p.species, p.breedId) + ')';
    if (active && p.id === active.id) opt.selected = true;
    sel.appendChild(opt);
  });
}

function initProfileBar() {
  let active = profileStore.getActive();
  if (!active) {
    const all = profileStore.loadAll();
    if (all.length > 0) {
      profileStore.setActiveId(all[0].id);
      active = all[0];
    }
  }
  if (active) setFormValues(active);
  renderProfileBar();
}

function autoSaveProfile() {
  const active = profileStore.getActive();
  if (!active) return;
  const pf = getFormValues();
  pf.name = document.getElementById('profileNameInput').value || '未命名';
  const v = PetProfile.validateProfile(pf);
  if (!v.valid) return;
  profileStore.update(active.id, pf);
  renderProfileBar();
}

// Event handlers
document.getElementById('profileEmpty').querySelector('button').addEventListener('click', () => {
  const name = prompt('给宠物起个名字：', '小花');
  if (!name || !name.trim()) return;
  const p = profileStore.create({ name: name.trim(), species: 'cat', breedId: 'british_shorthair', ageMonths: 12, weightKg: 4 });
  setFormValues(p);
  renderProfileBar();
});

document.getElementById('profileBar').querySelector('[title="新建"]').addEventListener('click', () => {
  const name = prompt('给宠物起个名字：', '新档案');
  if (!name || !name.trim()) return;
  const p = profileStore.create({ name: name.trim(), species: 'cat', breedId: 'british_shorthair', ageMonths: 12, weightKg: 4 });
  setFormValues(p);
  renderProfileBar();
});

document.getElementById('profileBar').querySelector('[title="复制"]').addEventListener('click', () => {
  const active = profileStore.getActive();
  if (!active) return;
  const dup = profileStore.duplicate(active.id);
  if (!dup) return;
  setFormValues(dup);
  renderProfileBar();
});

document.getElementById('profileBar').querySelector('[title="保存"]').addEventListener('click', () => {
  autoSaveProfile();
  alert('已保存');
});

document.getElementById('profileBar').querySelector('[title="删除"]').addEventListener('click', () => {
  const active = profileStore.getActive();
  if (!active) return;
  if (!confirm(`确定删除「${active.name}」？`)) return;
  profileStore.delete(active.id);
  const next = profileStore.getActive();
  if (next) setFormValues(next);
  else document.getElementById('petForm').reset();
  renderProfileBar();
});

document.getElementById('profileSelect').addEventListener('change', function() {
  const id = this.value;
  profileStore.setActiveId(id);
  const p = profileStore.getById(id);
  if (p) setFormValues(p);
  renderProfileBar();
  document.getElementById('results').style.display = 'none';
});

document.getElementById('profileNameInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    autoSaveProfile();
    e.preventDefault();
  }
});

// checkbox interactions
document.querySelectorAll('.checkbox-item').forEach(item => {
  item.addEventListener('click', () => {
    const cb = item.querySelector('input');
    cb.checked = !cb.checked;
    item.classList.toggle('selected', cb.checked);
  });
});

document.getElementById('petForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const breedId = formData.get('breedId');
  if (!breedId) { alert('请选择品种'); return; }

  const btn = e.target.querySelector('button');
  btn.disabled = true; btn.textContent = '⏳ 正在分析...';

  const results = document.getElementById('results');
  results.innerHTML = '<div class="card"><div class="loading">⏳ 多维分析中，为你匹配最佳宠粮...</div></div>';
  results.style.display = 'block';

  const input = {
    species: formData.get('species'),
    breedId,
    ageMonths: parseInt(formData.get('ageMonths')),
    weightKg: parseFloat(formData.get('weightKg')),
    sex: formData.get('sex') || 'unknown',
    neutered: formData.get('neutered') === 'true' ? true : formData.get('neutered') === 'false' ? false : 'unknown',
    bodyConditionScore: parseInt(formData.get('bodyConditionScore')) || 5,
    activityLevel: formData.get('activityLevel') || 'normal',
    targetWeightKg: formData.get('targetWeightKg') ? parseFloat(formData.get('targetWeightKg')) : undefined,
    budgetLevel: formData.get('budgetLevel') || 'any',
    foodType: formData.getAll('foodType'),
    preferredGoal: formData.get('preferredGoal') || undefined,
    allergies: formData.getAll('allergies'),
    diseases: formData.getAll('diseases'),
  };

  autoSaveProfile();

  try {
    const res = await fetch('/api/recommend', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(input) });
    const data = await res.json();
    if (data.error) { results.innerHTML = '<div class="card"><div class="error">请求失败: ' + (data.details ? data.details.join('; ') : data.error) + '</div></div>'; return; }
    currentRecommendations = data.recommendations || [];
    currentSort = 'health';
    renderResults(data);
  } catch (err) { results.innerHTML = '<div class="card"><div class="error">网络错误: ' + err.message + '</div></div>'; }
  finally { btn.disabled = false; btn.textContent = '🔍 为我推荐宠粮'; }
});

function sortRecommendations(type) {
  const sorted = [...currentRecommendations];
  if (type === 'health') sorted.sort((a, b) => b.scoreBreakdown.healthSafety - a.scoreBreakdown.healthSafety || b.totalScore - a.totalScore);
  else if (type === 'price') sorted.sort((a, b) => (a.price_range === '低' || a.price_range === '中低' ? -1 : 1) || b.totalScore - a.totalScore);
  else if (type === 'protein') sorted.sort((a, b) => b.protein - a.protein || b.totalScore - a.totalScore);
  else if (type === 'lowfat') sorted.sort((a, b) => a.fat - b.fat || b.totalScore - a.totalScore);
  return { ...arguments.callee.caller, recommendations: sorted };
}

function renderResults(data) {
  const { inputSummary, profileInsights, energy, diseaseInfo, recommendations, excludedFoods, totalMatched, totalExcluded } = data;
  let html = '<div class="card">';
  html += '<div class="result-header">';
  html += `<h2>🐾 ${inputSummary.breedName} · ${inputSummary.species === 'dog' ? '狗狗' : '猫咪'}</h2>`;
  html += `<div class="energy">${inputSummary.ageMonths}月龄 · ${inputSummary.weightKg}kg · ${inputSummary.lifeStage === 'puppy' ? '幼年期' : inputSummary.lifeStage === 'kitten' ? '幼猫期' : inputSummary.lifeStage === 'senior' ? '老年期' : '成年期'} · ${inputSummary.activityLevel === 'high' ? '高活动量' : inputSummary.activityLevel === 'low' ? '低活动量' : '正常活动量'}</div>`;
  html += `<div class="energy">每日热量需求：${energy.mer} kcal (RER: ${energy.rer} kcal · 生命阶段×${energy.factors.lifeStage} · 绝育×${energy.factors.neutered} · 活动×${energy.factors.activity} · 体态×${energy.factors.bodyCondition})</div>`;
  html += '</div>';

  if (profileInsights && profileInsights.length) {
    html += '<div class="insight-box"><strong>📊 数据分析：</strong><br>';
    profileInsights.forEach(t => html += `· ${t}<br>`);
    html += '</div>';
  }
  if (diseaseInfo) {
    html += '<div class="disease-info"><strong>⚠ 健康提示：</strong><br>';
    diseaseInfo.tips.forEach(t => html += `· ${t}<br>`);
    html += `<br><strong>优选成分：</strong>${diseaseInfo.preferIngredients.join('、')}<br>`;
    html += `<strong>避免成分：</strong>${diseaseInfo.avoidIngredients.join('、')}`;
    html += '</div>';
  }
  html += '</div>';

  if (!recommendations || recommendations.length === 0) {
    html += '<div class="card"><div class="loading">暂未找到完全匹配的粮，请尝试放宽条件</div></div>';
  } else {
    // 营养对比图表
    html += '<div class="card">';
    html += '<div class="toggle-section" onclick="this.nextElementSibling.classList.toggle(\'open\');this.textContent=this.textContent.startsWith(\'📊\')?\'📊 收起营养对比\':\'📊 展开营养对比\'">📊 展开营养对比</div>';
    html += '<div class="toggle-content" id="chartSection">';
    html += '<div style="display:flex;flex-wrap:wrap;gap:20px;margin-top:12px">';
    html += '<div style="flex:1;min-width:300px"><canvas id="radarChart" width="400" height="400" aria-label="营养成分雷达图" style="max-width:100%"></canvas></div>';
    html += '<div style="flex:1;min-width:300px"><canvas id="phosphorusChart" width="400" height="280" aria-label="磷含量对比条形图" style="max-width:100%"></canvas></div>';
    html += '</div>';
    html += '<table style="width:100%;font-size:12px;margin-top:8px;border-collapse:collapse" aria-label="营养对比表格"><thead><tr style="background:#fdf6f0">';
    html += '<th style="padding:4px;text-align:left">粮</th><th>蛋白%</th><th>脂肪%</th><th>纤维%</th><th>磷%</th><th>钠%</th><th>镁%</th>';
    html += '</tr></thead><tbody id="chartTableBody"></tbody></table>';
    html += '</div></div>';

    html += `<div class="card"><h2>🏆 为您推荐（共 ${totalMatched} 款通过筛选，${totalExcluded || 0} 款被排除）</h2>`;
    html += '<div class="sort-bar">';
    html += '<button class="sort-btn active" onclick="sortAndRender(\'health\', this)">🛡 健康优先</button>';
    html += '<button class="sort-btn" onclick="sortAndRender(\'price\', this)">💰 性价比优先</button>';
    html += '<button class="sort-btn" onclick="sortAndRender(\'protein\', this)">💪 高蛋白优先</button>';
    html += '<button class="sort-btn" onclick="sortAndRender(\'lowfat\', this)">🥩 低脂优先</button>';
    html += '</div>';
    html += '<div id="recommendationList"></div>';
    html += '<div class="disclaimer">⚠ 免责声明：本结果仅供日常选粮参考。确诊疾病、处方粮使用请务必咨询执业兽医。</div>';
    html += '</div>';
  }

  document.getElementById('results').innerHTML = html;
  renderRecommendationCards(recommendations);
  const pLimit = diseaseInfo?.restrictions?.phosphorus_max || 1.0;
  setTimeout(() => drawCharts(recommendations, pLimit), 100);
}

function renderRecommendationCards(list) {
  let html = '';
  list.forEach((food, i) => {
    const sb = food.scoreBreakdown;
    html += '<div class="food-card">';
    html += '<div class="food-header">';
    html += '<div class="food-title">';
    html += `<h3>#${i + 1} ${food.brand} · ${food.name}</h3>`;
    html += `<div class="desc">${food.desc}</div>`;
    html += '</div>';
    html += `<div class="total-score">${food.totalScore}<small>综合分</small></div>`;
    html += '</div>';

    // score bars
    html += '<div class="score-bars">';
    html += barItem('健康安全', sb.healthSafety, 40);
    html += barItem('阶段匹配', sb.lifeStageFit, 15);
    html += barItem('品种适配', sb.breedFit, 15);
    html += barItem('营养均衡', sb.nutritionFit, 15);
    html += barItem('偏好符合', sb.preferenceFit, 10);
    html += barItem('数据可信', sb.dataConfidence, 5);
    html += '</div>';

    // match reasons / cautions
    if (food.matchReasons && food.matchReasons.length) {
      html += '<div class="match-reasons">';
      food.matchReasons.forEach(r => html += `<span class="reason">✅ ${r}</span>`);
      (food.cautions || []).forEach(c => html += `<span class="caution">⚠ ${c}</span>`);
      html += '</div>';
    }

    // tags
    html += '<div class="food-tags">';
    food.tags.forEach(t => {
      html += `<span class="tag${t === '处方粮' ? ' prescription' : ''}">${t}</span>`;
    });
    html += '</div>';

    // nutrition
    html += '<div class="nutrition-grid">';
    html += `<div class="nutrition-item"><div class="value">${food.protein}%</div><div class="label">蛋白质</div></div>`;
    html += `<div class="nutrition-item"><div class="value">${food.fat}%</div><div class="label">脂肪</div></div>`;
    html += `<div class="nutrition-item"><div class="value">${food.phosphorus}%</div><div class="label">磷</div></div>`;
    html += `<div class="nutrition-item"><div class="value">${food.calorie_per_100g}</div><div class="label">kcal/100g</div></div>`;
    html += '</div>';

    // feeding guide
    if (food.feedingGuide) {
      const fg = food.feedingGuide;
      html += `<div class="feeding-box"><strong>🍽 建议喂食：</strong>每日 ${fg.gramsPerDay}g（约${fg.mealsPerDay}餐）`;
      if (food.price_rmb) html += ` · 参考价：${food.price_rmb}`;
      html += `<br><small>${fg.note}</small></div>`;
    }

    // warnings / good points
    if (food.warnings && food.warnings.length) html += '<div class="warning-list">⚠ ' + food.warnings.join(' · ') + '</div>';
    if (food.goodPoints && food.goodPoints.length) html += '<div class="goodpoint-list">✅ ' + food.goodPoints.join(' · ') + '</div>';

    html += '</div>';
  });
  const el = document.getElementById('recommendationList');
  if (el) el.innerHTML = html;
}

function barItem(label, score, max) {
  const pct = Math.round((score / max) * 100);
  return `<div class="score-bar-item"><div class="label"><span>${label}</span><span>${score}/${max}</span></div><div class="bar"><div class="fill" style="width:${pct}%"></div></div></div>`;
}

function sortAndRender(type, btn) {
  currentSort = type;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const sorted = [...currentRecommendations];
  if (type === 'health') sorted.sort((a, b) => (b.scoreBreakdown?.healthSafety || 0) - (a.scoreBreakdown?.healthSafety || 0) || b.totalScore - a.totalScore);
  else if (type === 'price') sorted.sort((a, b) => (a.price_range === '低' || a.price_range === '中低' ? -1 : 1) - (b.price_range === '低' || b.price_range === '中低' ? -1 : 1) || b.totalScore - a.totalScore);
  else if (type === 'protein') sorted.sort((a, b) => b.protein - a.protein || b.totalScore - a.totalScore);
  else if (type === 'lowfat') sorted.sort((a, b) => a.fat - b.fat || b.totalScore - a.totalScore);
  renderRecommendationCards(sorted);
}

function drawCharts(recommendations, phosphorusLimit) {
  const top5 = recommendations.slice(0, 5);
  const radarCanvas = document.getElementById('radarChart');
  if (!radarCanvas) return;
  const rCtx = radarCanvas.getContext('2d');
  const dims = ['蛋白质', '脂肪', '纤维', '磷低优', '钠', '镁'];
  const maxes = [50, 30, 5, 1.5, 0.5, 0.12];
  const colors = ['#8B5E3C', '#c49a6c', '#e8a838', '#5b9bd5', '#4a8'];

  const cx = 200, cy = 200, r = 150;
  rCtx.clearRect(0, 0, 400, 400);
  for (let i = 1; i <= 5; i++) {
    rCtx.beginPath();
    for (let j = 0; j < dims.length; j++) {
      const a = (j / dims.length) * Math.PI * 2 - Math.PI / 2;
      const rr = (r / 5) * i;
      const x = cx + Math.cos(a) * rr, y = cy + Math.sin(a) * rr;
      if (j === 0) rCtx.moveTo(x, y); else rCtx.lineTo(x, y);
    }
    rCtx.closePath(); rCtx.strokeStyle = '#f0e6d8'; rCtx.stroke();
  }
  for (let i = 0; i < dims.length; i++) {
    const a = (i / dims.length) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
    rCtx.beginPath(); rCtx.moveTo(cx, cy); rCtx.lineTo(x, y);
    rCtx.strokeStyle = '#e8d5c4'; rCtx.stroke();
    rCtx.fillStyle = '#3e2e23'; rCtx.font = '11px sans-serif';
    rCtx.textAlign = a > 1.2 && a < 2 ? 'center' : a > Math.PI / 2 ? 'right' : 'left';
    rCtx.fillText(dims[i], x + Math.cos(a) * 12, y + Math.sin(a) * 12);
  }
  top5.forEach((food, fi) => {
    const vals = [food.protein, food.fat, food.fiber, Math.max(0, 1.5 - food.phosphorus), food.sodium, food.magnesium];
    rCtx.beginPath();
    for (let i = 0; i < dims.length; i++) {
      const a = (i / dims.length) * Math.PI * 2 - Math.PI / 2;
      const radius = Math.min(1, vals[i] / maxes[i]) * r;
      const x = cx + Math.cos(a) * radius, y = cy + Math.sin(a) * radius;
      if (i === 0) rCtx.moveTo(x, y); else rCtx.lineTo(x, y);
    }
    rCtx.closePath(); rCtx.strokeStyle = colors[fi]; rCtx.lineWidth = 2; rCtx.stroke();
    rCtx.fillStyle = colors[fi] + '20'; rCtx.fill();
  });
  rCtx.font = '10px sans-serif';
  top5.forEach((food, i) => { rCtx.fillStyle = colors[i]; rCtx.fillText(food.brand, 310, 20 + i * 16); });

  const pCanvas = document.getElementById('phosphorusChart');
  if (!pCanvas) return;
  const pCtx = pCanvas.getContext('2d');
  pCtx.clearRect(0, 0, 400, 280);
  const sorted = [...recommendations].sort((a, b) => a.phosphorus - b.phosphorus).slice(0, 8);
  const barW = 380, barX = 10, barY = 30, barH = 24, gap = 8;
  const limit = phosphorusLimit || 1.0;
  const maxP = Math.max(limit, ...sorted.map(f => f.phosphorus)) * 1.2;
  sorted.forEach((food, i) => {
    const y = barY + i * (barH + gap), w = (food.phosphorus / maxP) * barW;
    pCtx.fillStyle = food.phosphorus <= limit ? '#4a8' : '#e8a838';
    pCtx.fillRect(barX, y, w, barH);
    pCtx.fillStyle = '#3e2e23'; pCtx.font = '10px sans-serif';
    pCtx.fillText(food.brand, barX + 4, y + barH / 2 + 4);
  });
  const limitX = barX + (limit / maxP) * barW;
  pCtx.beginPath(); pCtx.moveTo(limitX, barY - 2);
  pCtx.lineTo(limitX, barY + sorted.length * (barH + gap));
  pCtx.strokeStyle = '#c44'; pCtx.setLineDash([4, 4]); pCtx.lineWidth = 2; pCtx.stroke(); pCtx.setLineDash([]);
  pCtx.fillStyle = '#c44'; pCtx.font = '10px sans-serif';
  pCtx.fillText('限' + limit + '%', limitX + 4, barY - 4);

  const tbody = document.getElementById('chartTableBody');
  if (tbody) {
    top5.forEach(f => tbody.insertAdjacentHTML('beforeend',
      '<tr><td style="padding:3px">' + f.brand + '</td><td style="text-align:center">' + f.protein + '</td><td style="text-align:center">' + f.fat + '</td><td style="text-align:center">' + f.fiber + '</td><td style="text-align:center">' + f.phosphorus + '</td><td style="text-align:center">' + f.sodium + '</td><td style="text-align:center">' + f.magnesium + '</td></tr>'));
  }
}
</script>
